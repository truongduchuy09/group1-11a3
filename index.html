<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group 1 - 11A3</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        * {
            margin: 0 !important;
            padding: 0 !important;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .main-poster {
            width: 100%;
            height: 100%;
            object-fit: fill;
            display: block;
        }

        .overlay-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .hotspot {
            position: absolute;
            pointer-events: auto;
            text-decoration: none;
            background: rgba(255, 255, 255, 0);
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            border: 2px solid rgba(255, 255, 255, 0);
        }

        .hotspot:hover {
            transform: scale(1.025);
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid rgba(255, 255, 255, 1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        /* Tọa độ hotspot */
        .box-1 { top: 20.2%; left: 3.6%; width: 44.5%; height: 18.6%; }
        .box-2 { top: 45.7%; left: 3.6%; width: 44.7%; height: 19%; }
        .box-3 { top: 71.2%; left: 4.7%; width: 35.1%; height: 21.4%; }
        .box-4 { top: 20%; left: 52.5%; width: 44.8%; height: 18.9%; }
        .box-5 { top: 45.5%; left: 52.7%; width: 44.5%; height: 19%; }
        .box-6 { top: 71.5%; left: 61%; width: 36.4%; height: 21.8%; }

        /* Style cho bảng thông báo Fullscreen */
        #fullscreen-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden; /* Mặc định ẩn */
            opacity: 0;
            transition: opacity 0.5s;
        }

        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            max-width: 400px;
        }

        .modal-content h2 { color: #333; margin-bottom: 15px; font-size: 20px; }
        .modal-content p { color: #666; margin-bottom: 25px; }

        .btn-group { display: flex; justify-content: center; gap: 15px; }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-confirm { background: #d32f2f; color: #fff; }
        .btn-confirm:hover { background: #b71c1c; }
        .btn-cancel { background: #eee; color: #333; }
        .btn-cancel:hover { background: #ddd; }
    </style>
</head>
<body>

    <div id="fullscreen-modal">
        <div class="modal-content">
            <h2>Chế độ toàn màn hình</h2>
            <p>để có trải nghiệm tốt nhất hãy mở toàn màn hình bằng nút màu đỏ phía dưới</p>
            <div class="btn-group">
                <button class="btn btn-confirm" onclick="enableFullScreen()">Đồng ý</button>
                <button class="btn btn-cancel" onclick="closeModal()">Bỏ qua</button>
            </div>
        </div>
    </div>

    <div class="wrapper">
        <img src="image.png" class="main-poster">
        <div class="overlay-layer">
            <a href="https://henrry.dev/" target="_blank" class="hotspot box-1"></a>
            <a href="https://henrry.dev/" target="_blank" class="hotspot box-2"></a>
            <a href="https://henrry.dev/" target="_blank" class="hotspot box-3"></a>
            <a href="https://henrry.dev/" target="_blank" class="hotspot box-4"></a>
            <a href="https://henrry.dev/" target="_blank" class="hotspot box-5"></a>
            <a href="https://henrry.dev/" target="_blank" class="hotspot box-6"></a>
        </div>
    </div>

    <script>
        const modal = document.getElementById('fullscreen-modal');

        // Hiển thị thông báo khi vào trang nếu là máy tính
        window.onload = function() {
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            if (!isMobile) {
                modal.style.visibility = 'visible';
                modal.style.opacity = '1';
            }
        };

        function closeModal() {
            modal.style.opacity = '0';
            setTimeout(() => { modal.style.visibility = 'hidden'; }, 500);
        }

        function enableFullScreen() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { /* Safari */
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { /* IE11 */
                elem.msRequestFullscreen();
            }
            closeModal();
        }
    </script>
</body>
</html>
