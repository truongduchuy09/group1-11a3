<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tổ 1 - 11A3</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* Tràn viền tuyệt đối 4 phía */
        * {
            margin: 0 !important;
            padding: 0 !important;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        .wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .main-poster {
            width: 100%;
            height: 100%;
            object-fit: fill; 
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Vùng nhấn tàng hình */
        .hotspot {
            position: absolute;
            pointer-events: auto;
            text-decoration: none;
            background: rgba(255, 255, 255, 0);
            border-radius: 8px;
            /* Animation mượt, thời gian ngắn để cảm giác nhạy */
            transition: all 0.2s ease-in-out;
            z-index: 10;
        }

        /* Hiệu ứng phóng to ĐỀU và ĐẬM (nhích 0.2mm) */
        .hotspot:hover {
            /* Scale 1.02 giúp nhích nhẹ mà không gây méo chữ */
            transform: scale(1.02); 
            /* Làm đậm vùng đó bằng cách tăng độ sáng và phủ nhẹ lớp trắng */
            background: rgba(255, 255, 255, 0.1);
            filter: brightness(1.2);
            /* Đổ bóng sắc nét để khối nội dung tách khỏi nền */
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Tọa độ % chuẩn xác theo bộ coords 1366x768 bạn vừa gửi */
        .box-1 { top: 20.2%; left: 3.6%; width: 44.5%; height: 18.6%; }
        .box-2 { top: 45.7%; left: 3.6%; width: 44.7%; height: 19%; }
        .box-3 { top: 71.2%; left: 4.7%; width: 35.1%; height: 21.4%; }
        
        .box-4 { top: 20%; left: 52.5%; width: 44.8%; height: 18.9%; }
        .box-5 { top: 45.5%; left: 52.7%; width: 44.5%; height: 19%; }
        .box-6 { top: 71.5%; left: 61%; width: 36.4%; height: 21.8%; }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="image.png" class="main-poster">

        <div class="overlay">
            <a href="https://henrry.dev/" target="_blank" class="hotspot box-1"></a>
            <a href="https://henrry.dev/" target="_blank" class="hotspot box-2"></a>
            <a href="https://henrry.dev/" target="_blank" class="hotspot box-3"></a>
            <a href="https://henrry.dev/" target="_blank" class="hotspot box-4"></a>
            <a href="https://henrry.dev/" target="_blank" class="hotspot box-5"></a>
            <a href="https://henrry.dev/" target="_blank" class="hotspot box-6"></a>
        </div>
    </div>

</body>
</html>
